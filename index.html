<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="index.css"/>
</head>
<body>
<div class="app">

  <!-- ══ CALCULATOR PANEL ══ -->
  <div class="calc-panel">

    <!-- Editable Text Input -->
    <div class="expr-input-wrap">
      <input type="text" class="expr-input" id="expr-input"
             placeholder="Type an expression…" autocomplete="off" spellcheck="false"/>
    </div>

    <!-- Output Display (result only — input is never overridden) -->
    <div class="output">
      <div class="output-label">Result</div>
      <div class="output-result is-empty" id="output">—</div>
    </div>

    <!-- Scientific Buttons -->
    <div class="sci-row">
      <button class="sci" data-insert="sqrt(">√(</button>
      <button class="sci" data-insert="^">xʸ</button>
      <button class="sci" data-insert="sin(">sin(</button>
      <button class="sci" data-insert="cos(">cos(</button>
      <button class="sci" data-insert="tan(">tan(</button>
      <button class="sci" data-insert="(">(</button>
      <button class="sci" data-insert=")">)</button>
      <button class="sci" id="btn-backspace">⌫</button>
    </div>

    <!-- Constants -->
    <div class="const-row">
      <button class="const span-2" data-insert="pi">π  pi</button>
      <button class="const span-2" data-insert="e">e  Euler</button>
    </div>

    <div class="divider"></div>

    <!-- Standard Grid -->
    <div class="std-grid">
      <button class="util" id="btn-ac">AC</button>
      <button class="util" id="btn-sign">+/−</button>
      <button class="util" id="btn-percent">%</button>
      <button class="op"   data-insert="/">÷</button>

      <button class="num" data-val="7">7</button>
      <button class="num" data-val="8">8</button>
      <button class="num" data-val="9">9</button>
      <button class="op"  data-insert="*">×</button>

      <button class="num" data-val="4">4</button>
      <button class="num" data-val="5">5</button>
      <button class="num" data-val="6">6</button>
      <button class="op"  data-insert="-">−</button>

      <button class="num" data-val="1">1</button>
      <button class="num" data-val="2">2</button>
      <button class="num" data-val="3">3</button>
      <button class="op"  data-insert="+">+</button>

      <button class="num span-2" data-val="0">0</button>
      <button class="dot" data-insert=".">.</button>
      <button class="eq"  id="btn-eq">=</button>
    </div>

  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">

    <!-- Variables -->
    <div class="section">
      <div class="section-title">Variables</div>
      <div class="var-form">
        <input type="text" id="var-name"  class="name-in" placeholder="name" maxlength="20" spellcheck="false"/>
        <input type="text" id="var-value" placeholder="value" spellcheck="false"/>
        <button class="btn-add" id="btn-add-var">Add</button>
      </div>
      <div class="var-error" id="var-error"></div>
      <div class="var-list"  id="var-list">
        <div class="var-empty">No variables yet</div>
      </div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-title">
        History
        <button class="hist-clear" id="btn-clear-hist">Clear all</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="hist-empty">No history yet</div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
