<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<div class="calc-wrapper">
  <div class="calc-label">Calculator</div>

  <div class="calculator">

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <!-- Row 1 -->
      <button class="util" id="btn-ac">AC</button>
      <button class="util" id="btn-sign">+/−</button>
      <button class="util" id="btn-percent">%</button>
      <button class="op"   id="btn-divide">÷</button>

      <!-- Row 2 -->
      <button class="num" data-val="7">7</button>
      <button class="num" data-val="8">8</button>
      <button class="num" data-val="9">9</button>
      <button class="op"  id="btn-multiply">×</button>

      <!-- Row 3 -->
      <button class="num" data-val="4">4</button>
      <button class="num" data-val="5">5</button>
      <button class="num" data-val="6">6</button>
      <button class="op"  id="btn-subtract">−</button>

      <!-- Row 4 -->
      <button class="num" data-val="1">1</button>
      <button class="num" data-val="2">2</button>
      <button class="num" data-val="3">3</button>
      <button class="op"  id="btn-add">+</button>

      <!-- Row 5 -->
      <button class="num span-2" data-val="0">0</button>
      <button class="dot" id="btn-dot">.</button>
      <button class="eq"  id="btn-eq">=</button>
    </div>

  </div>

  <div class="calc-footer">
    <div class="dot-ind active"></div>
    <div class="dot-ind"></div>
    <div class="dot-ind"></div>
  </div>
</div>

<!-- ✏️ Add your JS here or link your script -->
<script src="script.js"></script>

</body>
</html>
